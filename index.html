<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - Orca丶</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="#" class="nav-avatar">
                    <img src="assets/Hinami Aoi.jpg" alt="头像" class="avatar-img">
                </a>
                <a href="#" class="nav-logo">
                    <span class="logo-text"></span>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main>
        <!-- 关于我 -->
        <section id="about" class="section hero-band">
            <div class="container">
                <div class="hero-content">
                    <div class="hero-text">
                        <h1 class="display-xl animate-fade-up">你好，我是Orca丶</h1>
                        <p class="hero-subtitle body-lg animate-fade-up delay-1">
                            热爱游戏开发的菜鸟一枚
                        </p>
                        <div class="hero-links animate-fade-up delay-2">
                            <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
                            <span class="link-separator">·</span>
                            <a href="https://bilibili.com" target="_blank" rel="noopener noreferrer">Bilibili</a>
                            <span class="link-separator">·</span>
                            <a href="mailto:your@email.com">Email</a>
                        </div>
                    </div>
                    <div class="hero-illustration animate-fade-up delay-3">
                        <div class="avatar-container">
                            <div class="avatar-placeholder">
                                <span class="avatar-icon">✦</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p class="body-sm">© 2024 . 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>

</html>
